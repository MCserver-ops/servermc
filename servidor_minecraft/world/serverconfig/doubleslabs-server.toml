
#General Configuration
[general]
	#The list of slabs (or tags) to ignore when creating double slabs
	#Example: minecraft:purpur_slab
	slabBlacklist = []
	#The list of slabs (or tags) to ignore when creating vertical slabs
	#Example: minecraft:purpur_slab
	#Example: #minecraft:slabs
	verticalSlabBlacklist = ["minecraft:campfire", "minecraft:soul_campfire", "doubleslabs:raised_campfire", "doubleslabs:raised_soul_campfire", "byg:boric_campfire", "doubleslabs:raised_boric_campfire", "byg:cryptic_campfire", "doubleslabs:raised_cryptic_campfire", "endergetic:ender_campfire", "doubleslabs:raised_ender_campfire"]
	#Whether to use the custom double slab when combining slabs of the same type
	replaceSameSlab = true
	#Whether to disable the placement of vertical slabs from regular horizontal slabs
	disableVerticalSlabPlacement = false
	#The list of slabs (or tags) to ignore when trying to convert between a regular slab and a vertical slab item
	#Use the wildcard value * to disable this feature for all slabs
	verticalSlabCraftingBlacklist = ["minecraft:campfire", "minecraft:soul_campfire", "doubleslabs:raised_campfire", "doubleslabs:raised_soul_campfire", "byg:boric_campfire", "doubleslabs:raised_boric_campfire", "byg:cryptic_campfire", "doubleslabs:raised_cryptic_campfire", "endergetic:ender_campfire", "doubleslabs:raised_ender_campfire"]

