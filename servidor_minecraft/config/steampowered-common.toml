
[steam]
	#HU generation for each fuel burning tick. 10HU=1mb of steam. THIS AFFECT ALL BURNERS AND BOILERS!
	#Range: 0 ~ 655360
	HuPerFuelTick = 840
	#This defines how many mbs of steam does a mb of water can turn into.
	#Range: 0.0 ~ 100000.0
	steamPerWater = 12.0

[boiler]
	#Range: 0 ~ 1000000
	steelBoilerHu = 1
	#Range: 0 ~ 1000000
	castIronBoilerHu = 1380
	#Maximum HU the boiler intakes. 10HU=1mb of steam. 
	#Range: 0 ~ 1000000
	bronzeBoilerHu = 1

[burner]
	#Range: 0 ~ 1000000
	castIronBurnerHu = 1380
	#Maximum HU the boiler emits. Note that this does not affect steam per fuel tick. 10HU=1mb of steam. 
	#Range: 0 ~ 1000000
	bronzeBurnerHu = 1
	#Range: 0 ~ 1000000
	steelBurnerHu = 1

[flywheel]

	[flywheel.cast_iron_flywheel]
		#Range: 0 ~ 8192
		castIronFlywheelCapacity = 256
		#Range: 0 ~ 1048576
		castIronFlywheelSteamStorage = 96000
		#Range: 0 ~ 8192
		castIronFlywheelSpeed = 32
		#Range: 0 ~ 8192
		castIronFlywheelSteamConsumptionPerTick = 32

	[flywheel.bronze_flywheel]
		#Range: 0 ~ 8192
		bronzeFlywheelSteamConsumptionPerTick = 1
		#Range: 0 ~ 8192
		bronzeFlywheelCapacity = 1
		#Range: 0 ~ 8192
		bronzeFlywheelSpeed = 1
		#Range: 0 ~ 1048576
		bronzeFlywheelSteamStorage = 1

	[flywheel.steel_flywheel]
		#Range: 0 ~ 1048576
		steelFlywheelSteamConsumptionPerTick = 1
		#Range: 0 ~ 8192
		steelFlywheelCapacity = 1
		#Range: 0 ~ 1048576
		steelFlywheelSteamStorage = 1
		#Range: 0 ~ 8192
		steelFlywheelSpeed = 1

[dynamo]
	#Range: 0 ~ 8192
	dynamoFeCapacity = 2048
	#Range: 0 ~ 8192
	dynamoImpact = 16
	#Range: 0.0 ~ 1.0
	dynamoEfficiency = 0.5
	#If dynamo is disabled in the server config, the following will be ignored!
	#Range: 0 ~ 8192
	dynamoFeMaxOut = 320

[cogwheel]
	#Range: 0.0 ~ 1.0
	castIronCogwheelImpact = 0.0
	#For those who want to make the game more challenging, you can add stress impact to cogwheels!
	#Range: 0.0 ~ 1.0
	bronzeCogwheelImpact = 0.0
	#Range: 0.0 ~ 1.0
	steelCogwheelImpact = 0.0

[burnerEfficiency]
	#Range: 0.0 ~ 1.0
	castIronBurnerEfficiency = 1.0
	#Fuel Tick to HU Convertion Percentage. 10HU=1mb of steam. 
	#Range: 0.0 ~ 1.0
	bronzeBurnerEfficiency = 0.1
	#Range: 0.0 ~ 1.0
	steelBurnerEfficiency = 0.1

